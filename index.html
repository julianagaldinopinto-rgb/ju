<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro | GitHub Project</title>
    <style>
        /* Variáveis de Cores para facilitar customização */
        :root {
            --primary-color: #2ea44f; /* Verde estilo GitHub */
            --bg-color: #f6f8fa;
            --text-color: #24292e;
            --border-color: #d0d7de;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 32px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: #f9fafb;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
            background-color: #ffffff;
        }

        /* Layout de colunas para CPF e Telefone */
        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: 1px solid rgba(27, 31, 36, 0.15);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #2c974b;
        }

        .btn-submit:active {
            background-color: #298e46;
            transform: translateY(1px);
        }

        /* Rodapé do card */
        .footer-info {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #656d76;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Criar nova conta</h2>
    
    <form action="#" method="POST">
        <div class="form-group">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="form-group">
            <label for="email">Endereço de e-mail</label>
            <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
            </div>
            <div class="form-group">
                <label for="tel">Telefone</label>
                <input type="tel" id="tel" name="tel" placeholder="(00) 00000-0000">
            </div>
        </div>

        <div class="form-group">
            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria">
                <option value="standard">Cliente Standard</option>
                <option value="premium">Cliente Premium</option>
                <option value="vip">Cliente VIP</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">Cadastrar Cliente</button>
    </form>

    <div class="footer-info">
        Ao cadastrar, você concorda com os Termos de Serviço.
    </div>
</div>

</body>
</html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Cadastro de Produto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid #343a40; /* Barra superior para estilo "estoque" */
        }

        h2 {
            color: #212529;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-row {
            display: flex;
            gap: 15px; /* Coloca campos lado a lado */
        }

        .form-group {
            margin-bottom: 15px;
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-size: 13px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #343a40;
            box-shadow: 0 0 5px rgba(52, 58, 64, 0.2);
        }

        /* Estilo específico para o botão de estoque */
        .btn-salvar {
            width: 100%;
            padding: 12px;
            background-color: #343a40;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-salvar:hover {
            background-color: #23272b;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Cadastro de Produto</h2>
    
    <form action="#">
        <div class="form-group">
            <label for="produto">Nome do Produto</label>
            <input type="text" id="produto" placeholder="Ex: Teclado Mecânico" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="sku">SKU / Código</label>
                <input type="text" id="sku" placeholder="ABC-123">
            </div>
            <div class="form-group">
                <label for="categoria">Categoria</label>
                <select id="categoria">
                    <option value="eletronicos">Eletrônicos</option>
                    <option value="perifericos">Periféricos</option>
                    <option value="escritorio">Escritório</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="preco">Preço (R$)</label>
                <input type="number" id="preco" step="0.01" placeholder="0,00">
            </div>
            <div class="form-group">
                <label for="quantidade">Qtd. em Estoque</label>
                <input type="number" id="quantidade" placeholder="0">
            </div>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição Breve</label>
            <textarea id="descricao" placeholder="Detalhes do item..."></textarea>
        </div>

        <button type="submit" class="btn-salvar">Salvar no Estoque</button>
    </form>
</div>

</body>
</html>
